name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: apps/web
      - run: pnpm lint
        working-directory: apps/web
      - run: pnpm typecheck
        working-directory: apps/web

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx ruff check services/ gateway/
      - run: uvx ruff format --check services/ gateway/

  test-publisher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: |
          cd services/publisher
          uv run pytest tests/ -v || echo "No tests yet"

  test-design:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: |
          pip install pydantic Pillow pytest
          PYTHONPATH=. pytest services/design_director/tests/ services/design_specialists/tests/ -v

  test-carousel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: |
          cd services/carousel_creator
          uv run --extra test pytest tests/ -v
